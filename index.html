<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENHYPEN 成員辨認測驗</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f4f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
  .card { background: #fff; border-radius: 20px; padding: 2rem; max-width: 480px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-size: 13px; color: #888; }
  .score-badge { background: #f0f0f0; border-radius: 99px; padding: 3px 12px; font-weight: 500; }
  .prog-wrap { background: #f0f0f0; border-radius: 99px; height: 4px; margin-bottom: 1.5rem; overflow: hidden; }
  .prog-bar { height: 4px; background: #7F77DD; border-radius: 99px; transition: width .3s; }
  .photo-box { text-align: center; margin-bottom: 1.25rem; }
  .photo-circle { width: 180px; height: 180px; border-radius: 50%; overflow: hidden; margin: 0 auto .75rem; border: 3px solid #eee; background: #f5f5f5; display: flex; align-items: center; justify-content: center; }
  .photo-circle img { width: 100%; height: 100%; object-fit: cover; object-position: top; display: block; }
  .q-label { font-size: 13px; color: #999; margin-bottom: .25rem; }
  .q-hint { font-size: 15px; font-weight: 500; color: #333; }
  .opts { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 1.25rem 0 1rem; }
  .opt { background: #fff; border: 1.5px solid #e0e0e0; border-radius: 12px; padding: 14px 10px; font-size: 15px; font-weight: 500; color: #333; cursor: pointer; transition: background .15s, border-color .15s; text-align: center; line-height: 1.4; }
  .opt:hover:not(:disabled) { background: #f5f5f5; border-color: #ccc; }
  .opt.correct { background: #EAF3DE; border: 2px solid #3B6D11; color: #27500A; }
  .opt.wrong { background: #FCEBEB; border: 2px solid #A32D2D; color: #791F1F; }
  .opt:disabled { cursor: default; }
  .sub { font-size: 12px; font-weight: 400; opacity: .65; display: block; margin-top: 2px; }
  .result { text-align: center; padding: .75rem 1rem; border-radius: 10px; font-size: 14px; font-weight: 500; display: none; }
  .result.show { display: block; }
  .result.ok { background: #EAF3DE; color: #27500A; }
  .result.no { background: #FCEBEB; color: #791F1F; }
  .end-box { text-align: center; padding: 2rem 1rem; }
  .end-emoji { font-size: 52px; margin-bottom: 1rem; }
  .restart-btn { margin-top: 1.25rem; padding: 10px 28px; border-radius: 10px; border: 1.5px solid #ddd; background: #fff; font-size: 14px; font-weight: 500; cursor: pointer; color: #333; }
  .restart-btn:hover { background: #f5f5f5; }
</style>
</head>

const members = [
  { name: "jungwon", hangul: "정원", hint: "隊長，在 I-LAND 以得票第一名出道", color: "#EEEDFE", tc: "#3C3489" },
  { name: "jay", hangul: "제이", hint: "韓裔美籍，出生於西雅圖，英文超流利", color: "#E1F5EE", tc: "#085041" },
  { name: "jake", hangul: "제이크", hint: "在澳洲長大，是唯一透過公開試鏡加入的成員", color: "#FAEEDA", tc: "#633806" },
  { name: "sunghoon", hangul: "성훈", hint: "前職業花式溜冰選手，有「冰上王子」美稱", color: "#FAECE7", tc: "#712B13" },
  { name: "sunoo", hangul: "선우", hint: "開朗陽光的開心果，笑容超級治癒", color: "#FBEAF0", tc: "#72243E" },
  { name: "niki", hangul: "니키", hint: "日本出身的最年輕成員，舞蹈實力驚人", color: "#EAF3DE", tc: "#27500A" }
];

function shuffle(a) {
  const arr = [...a];
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

const order = shuffle([0,1,2,3,4,5]);
let qi = 0, score = 0, answered = false;

function render() {
  answered = false;
  const m = members[order[qi]];
  document.getElementById('qnum').textContent = qi+1;
  document.getElementById('prog').style.width = ((qi+1)/6*100)+'%';
  document.getElementById('hint').textContent = m.hint;

  const photo = document.getElementById('photo');
  photo.innerHTML = '';
  const img = document.createElement('img');
  img.src = imgs[m.name];
  img.alt = '';
  photo.appendChild(img);

  const wrongPool = shuffle(members.filter((_,i) => i !== order[qi])).slice(0,3).map(x => x.name);
  const opts = shuffle([m.name, ...wrongPool]);

  const grid = document.getElementById('opts');
  grid.innerHTML = '';
  opts.forEach(name => {
    const mem = members.find(x => x.name === name);
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = name + '<span class="sub">' + mem.hangul + '</span>';
    btn.onclick = () => pick(btn, name, m.name);
    grid.appendChild(btn);
  });

  const r = document.getElementById('result');
  r.className = 'result';
  r.textContent = '';
}

function pick(btn, chosen, correct) {
  if (answered) return;
  answered = true;
  document.querySelectorAll('.opt').forEach(b => {
    b.disabled = true;
    const n = b.childNodes[0].textContent.trim();
    if (n === correct) b.classList.add('correct');
    else if (b === btn) b.classList.add('wrong');
  });
  const r = document.getElementById('result');
  const cm = members.find(x => x.name === correct);
  if (chosen === correct) {
    score++;
    document.getElementById('score').textContent = score;
    r.textContent = '✓ 答對了！' + cm.hint;
    r.className = 'result show ok';
  } else {
    r.textContent = '✗ 答錯了！正確答案是 ' + correct + '（' + cm.hangul + '）— ' + cm.hint;
    r.className = 'result show no';
  }
  setTimeout(() => { qi++; if (qi < 6) render(); else showEnd(); }, 2400);
}

function showEnd() {
  const emoji = score===6?'🏆':score>=4?'⭐':'📚';
  const msg = score===6?'完美分數！你是真正的 ENGENE！':score>=4?'答得不錯，繼續加油！':'多認識一下成員們吧～';
  document.getElementById('card').innerHTML = `
    <div class="end-box">
      <div class="end-emoji">${emoji}</div>
      <p style="font-size:22px;font-weight:600;color:#333;margin-bottom:.5rem">全部答完！</p>
      <p style="font-size:16px;color:#666;margin-bottom:.5rem">你答對了 <strong>${score}</strong> / 6 題</p>
      <p style="font-size:14px;color:#888;margin-bottom:1rem">${msg}</p>
      <button class="restart-btn" onclick="location.reload()">再玩一次</button>
    </div>
  `;
}

render();
</script>
